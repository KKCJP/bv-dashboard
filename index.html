
                        <!DOCTYPE html>
                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
							<style>
								body {
									background-color: white; /* Ensure the iframe has a white background */
								}

								:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--surface3:#2a2e42;
  --border:#2e3248;--text:#e8eaf0;--muted:#6b7090;
  --accent:#4f6ef7;--accent2:#7b93ff;
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;--radius:8px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:13px;}
.sidebar{width:200px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;top:0;left:0;height:100vh;z-index:100;}
.sidebar-logo{padding:0 18px 20px;font-size:15px;font-weight:600;border-bottom:1px solid var(--border);margin-bottom:12px;}
.sidebar-logo span{display:block;font-size:10px;color:var(--muted);font-weight:400;margin-top:2px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;color:var(--muted);transition:all .15s;font-size:12.5px;font-weight:500;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent2);border-left-color:var(--accent);background:var(--surface2);}
.main{margin-left:200px;flex:1;padding:24px;max-width:calc(100vw - 200px);}
.page{display:none;}.page.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.page-title{font-size:18px;font-weight:600;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:12.5px;font-family:var(--font);width:100%;outline:none;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--accent);}
.hint{font-size:10.5px;color:var(--muted);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font);transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{border-color:var(--accent);color:var(--accent2);}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--border);}.btn-danger:hover{background:rgba(248,113,113,.1);border-color:var(--red);}
.btn-sm{padding:5px 10px;font-size:11px;}.btn-xs{padding:3px 8px;font-size:11px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--surface2);padding:8px 12px;text-align:left;font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:500;white-space:nowrap;}
.badge-green{background:rgba(52,211,153,.12);color:var(--green);}
.badge-yellow{background:rgba(251,191,36,.12);color:var(--yellow);}
.badge-red{background:rgba(248,113,113,.12);color:var(--red);}
.badge-gray{background:var(--surface2);color:var(--muted);}
.badge-blue{background:rgba(79,110,247,.12);color:var(--accent2);}
.log-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;max-height:360px;overflow-y:auto;font-family:var(--mono);font-size:11.5px;line-height:1.7;}
.log-done{color:var(--green);}.log-error{color:var(--red);}.log-info{color:var(--accent2);}
.filter-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.filter-btn:hover{border-color:var(--accent);color:var(--text);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.toolbar-right{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;}
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:28px;text-align:center;cursor:pointer;color:var(--muted);font-size:12px;transition:all .2s;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);color:var(--accent2);background:rgba(79,110,247,.04);}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab-btn{padding:9px 20px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent);}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;max-width:320px;animation:slideIn .2s;}
.toast-success{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);color:var(--green);}
.toast-error{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:var(--red);}
.toast-info{background:rgba(79,110,247,.15);border:1px solid rgba(79,110,247,.3);color:var(--accent2);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.vod-checkbox-list{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;}
.vod-checkbox-list label{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;overflow:hidden;}
.vod-checkbox-list label span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.vod-checkbox-list label input[type=checkbox]{flex-shrink:0;}
.vod-checkbox-list label:last-child{border-bottom:none;}
.vod-checkbox-list label:hover{background:var(--surface2);}
.pagination{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:16px;font-size:12px;color:var(--muted);}
.progress-bar-wrap{background:var(--surface2);border-radius:20px;height:4px;overflow:hidden;margin:8px 0;}
.progress-bar{height:100%;background:var(--accent);border-radius:20px;transition:width .3s;}
.rename-input{background:var(--surface2);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:3px 6px;font-size:12px;font-family:var(--font);width:100%;}
							</style>
                        </head>

                        </body>
                        </html>
